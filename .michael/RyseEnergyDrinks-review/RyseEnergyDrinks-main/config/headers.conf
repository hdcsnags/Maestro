# HTTP security headers for Nginx/Apache deployment
# Reference: security audit lane

# Content Security Policy
# - GSAP CDN is explicitly whitelisted
# - Subresource Integrity (SRI) is expected for external scripts/styles
# - Approved inline script nonce for theme detection: replace {{CSP_NONCE}} at render time

add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https:; font-src 'self' https: data:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'nonce-{{CSP_NONCE}}' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; script-src-attr 'none'; connect-src 'self' https:; media-src 'self' https:; manifest-src 'self'; worker-src 'self' blob:; upgrade-insecure-requests; block-all-mixed-content" always;

# Additional security headers
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), usb=(), xr-spatial-tracking=()" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
