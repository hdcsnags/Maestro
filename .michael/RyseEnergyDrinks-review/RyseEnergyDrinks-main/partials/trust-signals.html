<section class="trust-signals" aria-labelledby="trust-signals-title">
  <div class="trust-signals__inner">
    <p class="trust-signals__eyebrow">Trusted by security-first teams</p>
    <h2 id="trust-signals-title" class="sr-only">Trust signals</h2>

    <div class="trust-signals__logos" aria-label="Client logos">
      <img
        src="/assets/logos/aurora.svg"
        alt="Aurora logo"
        width="120"
        height="36"
        loading="lazy"
      >
      <img
        src="/assets/logos/novapay.svg"
        alt="NovaPay logo"
        width="120"
        height="36"
        loading="lazy"
      >
      <img
        src="/assets/logos/atlas-health.svg"
        alt="Atlas Health logo"
        width="120"
        height="36"
        loading="lazy"
      >
      <img
        src="/assets/logos/embercloud.svg"
        alt="EmberCloud logo"
        width="120"
        height="36"
        loading="lazy"
      >
      <img
        src="/assets/logos/harbor.svg"
        alt="Harbor logo"
        width="120"
        height="36"
        loading="lazy"
      >
    </div>

    <div class="trust-signals__stats" aria-label="Key trust metrics">
      <div class="trust-signals__stat">
        <strong class="trust-signals__value">200+</strong>
        <span class="trust-signals__label">audits completed</span>
      </div>
      <div class="trust-signals__stat">
        <strong class="trust-signals__value">0</strong>
        <span class="trust-signals__label">breaches post-engagement</span>
      </div>
      <div class="trust-signals__stat">
        <strong class="trust-signals__value">24/7</strong>
        <span class="trust-signals__label">monitoring coverage</span>
      </div>
      <div class="trust-signals__stat">
        <strong class="trust-signals__value">99.9%</strong>
        <span class="trust-signals__label">uptime maintained</span>
      </div>
    </div>

    <div class="trust-signals__badges" aria-label="Certifications and badges">
      <img
        src="/assets/badges/iso-27001.webp"
        alt="ISO 27001 certification badge"
        width="112"
        height="112"
        loading="lazy"
      >
      <img
        src="/assets/badges/soc-2.webp"
        alt="SOC 2 Type II badge"
        width="112"
        height="112"
        loading="lazy"
      >
      <img
        src="/assets/badges/gdpr-ready.webp"
        alt="GDPR ready badge"
        width="112"
        height="112"
        loading="lazy"
      >
    </div>
  </div>
</section>
